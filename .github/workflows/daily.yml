name: PEA Screener — Mise à jour prix 7h

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 7h Paris (UTC+1) lundi-vendredi
  workflow_dispatch:          # bouton "Run workflow" manuel dans GitHub

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Mise à jour des prix Yahoo Finance
        run: python update_prices.py

      - name: Commit et push si changements
        run: |
          git config user.name "PEA Screener Bot"
          git config user.email "bot@pea-screener.fr"
          git add index.html
          git diff --staged --quiet || git commit -m "📈 Prix mis à jour $(date '+%d/%m/%Y %H:%M') (Paris)"
          git push
