name: PEA Newsletter — Samedi 8h

on:
  schedule:
    - cron: '0 7 * * 6'
  workflow_dispatch:

jobs:
  newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Envoyer newsletter
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python weekly_newsletter.py
